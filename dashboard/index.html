<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <title>北谷农业效率仪表盘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        * { -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', 'PingFang SC', sans-serif; background: #0f172a; color: #e2e8f0; overscroll-behavior-y: none; }
        .glass { background: rgba(30, 41, 59, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-hover { transition: all 0.2s ease; }
        .card-hover:active { transform: scale(0.98); opacity: 0.9; }
        .trend-up { color: #34d399; }
        .kpi-number { font-size: 32px; font-weight: 800; line-height: 1.1; letter-spacing: -0.02em; }
        @media (min-width: 768px) { .kpi-number { font-size: 42px; } }
        .status-running { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
        .status-optimizing { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
        .status-pending { background: rgba(59, 130, 246, 0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
        .story-card-dark { border-left: 3px solid #3b82f6; background: linear-gradient(to right, rgba(59,130,246,0.08), rgba(30,41,59,0.5)); }
        .progress-bar-bg { background: #334155; border-radius: 999px; height: 8px; overflow: hidden; }
        .progress-bar-fill { height: 100%; border-radius: 999px; transition: width 1s ease; }
        .sticky-header { position: sticky; top: 0; z-index: 30; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); }
        .touch-btn { transition: all 0.15s; min-height: 44px; display: inline-flex; align-items: center; justify-content: center; }
        .touch-btn:active { transform: scale(0.96); opacity: 0.8; }
        .month-tab { transition: all 0.2s; padding: 6px 12px; border-radius: 8px; font-size: 13px; white-space: nowrap; }
        .month-tab.active { background: rgba(96, 165, 250, 0.2); color: #60a5fa; border: 1px solid rgba(96,165,250,0.3); }
        .month-tab:not(.active) { color: #64748b; border: 1px solid transparent; }
        .month-tab:not(.active):hover { color: #94a3b8; background: rgba(255,255,255,0.03); }
        .year-tab { transition: all 0.2s; padding: 6px 14px; border-radius: 8px; font-size: 13px; white-space: nowrap; font-weight: 600; }
        .year-tab.active { background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(59,130,246,0.2)); color: #34d399; border: 1px solid rgba(16,185,129,0.4); }
        .year-tab:not(.active) { color: #64748b; border: 1px solid transparent; }
        .year-tab:not(.active):hover { color: #94a3b8; background: rgba(255,255,255,0.03); }
        .edit-input { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 0.5rem 0.75rem; border-radius: 0.5rem; width: 100%; font-size: 14px; }
        .edit-input:focus { outline: none; border-color: #60a5fa; }
        .edit-label { font-size: 12px; color: #94a3b8; margin-bottom: 0.25rem; display: block; }
        .edit-panel-bg { background: #0B1120; }
        .edit-section { background: #1e293b; border-radius: 0.75rem; padding: 1rem; margin-bottom: 1rem; border: 1px solid rgba(255,255,255,0.08); }
        .edit-section-title { font-size: 14px; font-weight: 600; color: #f1f5f9; margin-bottom: 0.75rem; }
        .hidden { display: none !important; }
        .month-scroll { overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .month-scroll::-webkit-scrollbar { display: none; }
        /* KPI流程展开区动画 */
        .kpi-flows-expand-section { animation: fadeSlideIn 0.3s ease; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .kpi-flow-item { transition: background 0.15s; }
        .kpi-flow-item:hover { background: rgba(255,255,255,0.04); }
        .kpi-expand-btn { transition: all 0.2s; }
        .kpi-expand-btn:hover { color: #818cf8; }

</head>
<body class="min-h-screen">

<!-- 顶部导航 -->
<nav class="sticky-header px-4 py-3 border-b border-slate-800/50">
    <div class="max-w-6xl mx-auto">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2.5">
                <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-green-600 flex items-center justify-center text-white font-bold text-sm">
                    <i class="fas fa-seedling"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold gradient-text leading-tight">北谷农业效率仪表盘</h1>
                    <p class="text-xs text-slate-500 leading-tight" id="client-name">北谷农业</p>
                </div>
            </div>
            <button onclick="toggleEdit()" id="edit-btn" class="touch-btn px-3 py-2 rounded-lg bg-blue-500/20 text-blue-400 text-xs hover:bg-blue-500/30 transition border border-blue-500/20">
                <i class="fas fa-edit mr-1"></i>编辑数据
            </button>
        </div>
        <!-- 月份切换：全年 + 各月 -->
        <div class="month-scroll flex gap-1.5" id="month-tabs"></div>
    </div>
</nav>

<!-- 编辑模式面板 -->
<div id="edit-panel" class="hidden fixed inset-0 z-50 edit-panel-bg overflow-y-auto">
    <div class="sticky top-0 z-10 bg-[#0B1120] border-b border-slate-800 px-4 py-3">
        <div class="max-w-2xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <button onclick="cancelEdit()" class="touch-btn w-9 h-9 rounded-lg bg-slate-800 text-slate-400 hover:text-white hover:bg-slate-700 transition flex items-center justify-center">
                    <i class="fas fa-times text-sm"></i>
                </button>
                <h2 class="text-base font-bold text-white"><i class="fas fa-edit mr-2 text-blue-400"></i>数据编辑</h2>
            </div>
            <div class="flex gap-2">
                <select id="edit-month-select" class="edit-input w-auto text-xs py-2 px-3" onchange="switchEditMonth(this.value)"></select>
                <button onclick="copyFromPrevMonth()" class="touch-btn px-3 py-2 rounded-lg bg-amber-500/20 text-amber-400 text-xs hover:bg-amber-500/30 transition border border-amber-500/20">
                    <i class="fas fa-copy mr-1"></i>复制上月
                </button>
                <button onclick="restoreFromLocalStorage()" class="touch-btn px-3 py-2 rounded-lg bg-purple-500/20 text-purple-400 text-xs hover:bg-purple-500/30 transition border border-purple-500/20">
                    <i class="fas fa-undo mr-1"></i>恢复备份
                </button>
                <button onclick="importFromFile()" class="touch-btn px-3 py-2 rounded-lg bg-slate-800 text-slate-300 text-xs hover:bg-slate-700 transition border border-slate-700">
                    <i class="fas fa-upload mr-1"></i>导入
                </button>
                <button onclick="exportToFile()" class="touch-btn px-3 py-2 rounded-lg bg-slate-800 text-slate-300 text-xs hover:bg-slate-700 transition border border-slate-700">
                    <i class="fas fa-download mr-1"></i>导出
                </button>
            </div>
        </div>
    </div>
    <div class="max-w-2xl mx-auto px-4 py-4 pb-32" id="edit-form"></div>
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-[#0B1120] border-t border-slate-800 z-10">
        <div class="max-w-2xl mx-auto flex gap-3">
            <button onclick="addNewMonth()" class="touch-btn flex-1 py-3 rounded-lg bg-emerald-500/20 text-emerald-400 text-sm hover:bg-emerald-500/30 transition border border-emerald-500/20">
                <i class="fas fa-plus mr-1"></i>新增月份
            </button>
            <button onclick="exportToFile()" class="touch-btn flex-1 py-3 rounded-lg bg-slate-800 text-slate-300 text-sm hover:bg-slate-700 transition border border-slate-700">
                <i class="fas fa-download mr-1"></i>导出JSON
            </button>
            <button onclick="saveAndClose()" class="touch-btn flex-1 py-3 rounded-lg bg-blue-500 text-white text-sm hover:bg-blue-600 transition font-medium">
                <i class="fas fa-check mr-1"></i>保存并更新
            </button>
        </div>
    </div>
</div>

<!-- 分享提示 -->
<div id="share-tip" class="hidden fixed top-14 left-0 right-0 z-20 bg-emerald-500/10 border-b border-emerald-500/20 px-4 py-2">

        <p class="text-xs text-emerald-400"><i class="fas fa-check-circle mr-1"></i>数据已更新！复制浏览器地址栏链接即可分享全年数据</p>
        <button onclick="dismissShareTip()" class="text-emerald-400 text-xs"><i class="fas fa-times"></i></button>
    </div>
</div>

<!-- 看板内容 -->
<main class="max-w-6xl mx-auto px-4 pt-4 pb-8 space-y-5" id="dashboard">
    <div class="flex items-center justify-between">
        <h2 class="text-sm font-semibold text-slate-400" id="current-view-label">--</h2>
        <span class="text-xs text-slate-600" id="data-period-display">--</span>
    </div>

    <!-- KPI卡片 -->
    <section class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-3" id="kpi-section"></section>

    <!-- KPI流程展开区（点击自动化流程数展开） -->
    <section id="kpi-flows-expand" class="mt-3 kpi-flows-expand-section" style="display: none;">

                <button onclick="toggleROIDetail('return')" class="touch-btn px-3 py-1.5 rounded-lg bg-emerald-500/10 text-emerald-400 text-xs hover:bg-emerald-500/20 transition border border-emerald-500/20"><i class="fas fa-eye mr-1"></i>回报</button>
            </div>
        </div>
        <div class="space-y-3 mb-4">
            <div>
                <div class="flex justify-between text-xs mb-1.5"><span class="text-slate-400">累计投入</span><span class="font-semibold text-slate-300">¥<span id="roi-invest-total">--</span>万</span></div>

            </div>
            <div>

                <div class="progress-bar-bg"><div class="progress-bar-fill bg-emerald-500" id="roi-return-bar" style="width: 0%"></div></div>

        </div>
        <div id="roi-return-detail" class="hidden bg-emerald-500/5 rounded-lg p-3 border border-emerald-500/20">
            <h3 class="text-xs font-semibold text-emerald-400 mb-2">回报明细</h3><div class="space-y-1.5" id="return-items"></div>
        </div>
    </section>

    <!-- 趋势图 -->
    <section class="glass rounded-xl p-4 card-hover">
        <div class="flex items-center justify-between mb-4">

            </div>
        </div>
        <div style="height: 240px;"><canvas id="trendChart"></canvas></div>
    </section>

    <!-- 价值故事 -->
    <section>
        <h2 class="text-base font-bold text-slate-100 mb-3" id="stories-title"><i class="fas fa-thumbtack text-rose-400 mr-1.5"></i>本月价值故事</h2>
        <div class="space-y-4" id="stories-container"></div>
    </section>

    <!-- 数据说明 -->
    <section class="glass rounded-xl p-4">
        <div class="space-y-4">
            <div>
                <h3 class="text-xs font-semibold text-slate-300 mb-2"><i class="fas fa-file-alt text-slate-500 mr-1.5"></i>数据说明</h3>
                <ul class="space-y-1.5 text-xs text-slate-400">
                    <li>• 数据来源：<span id="data-source">--</span></li>
                    <li>• 成本核算：<span id="data-cost">--</span></li>

                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-xs font-bold">智</div>

                    </div>
                </div>
            </div>
        </div>
    </section>
</main>

// ═══════════════════════════════════════════════════════════════
// 数据存取：URL hash 编码
// ═══════════════════════════════════════════════════════════════
function loadDataFromURL() {
    const hash = window.location.hash.slice(1);
    if (hash) {
        try {
            const decoded = atob(hash);
            const jsonStr = decodeURIComponent(decoded);
            const parsed = JSON.parse(jsonStr);
            if (parsed && parsed.months && parsed.months.length > 0) {
                DATA = parsed;
                console.log('✅ 从URL加载数据成功，月份数:', DATA.months.length);
                DATA.months.forEach((m, i) => {
                    console.log(`  ${m.monthName}: KPI=${m.kpi?.length || 0}, flows=${m.flows?.length || 0}, stories=${m.stories?.length || 0}`);
                });
                normalizeROIData();
                // 同时保存到 localStorage 作为后备
                try {
                    localStorage.setItem('dashboard_data_v3', JSON.stringify(DATA));
                    console.log('💾 已同步保存到 localStorage');
                } catch (e) {
                    console.warn('⚠️ localStorage 保存失败:', e.message);
                }
                return true;
            }
        } catch (e) {
            console.error('❌ 从URL加载数据失败:', e.message, 'Hash长度:', hash.length);
        }
    }
    
    // URL 加载失败或为空，尝试从 localStorage 加载
    try {
        // v3 key: 旧 v2 缓存自动作废
        const saved = localStorage.getItem('dashboard_data_v3');
        if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed && parsed.months && parsed.months.length > 0) {
                DATA = parsed;
                console.log('✅ 从 localStorage 加载数据成功，月份数:', DATA.months.length);
                return true;
            }
        }
    } catch (e) {
        console.error('❌ 从 localStorage 加载数据失败:', e.message);
    }
    
    console.log('ℹ️ 显示 DEFAULT_DATA（1-6月真实数据）');
    return false;
}

function saveDataToURL() {
    const jsonStr = JSON.stringify(DATA);
    // 只保存到 localStorage，不再自动写 hash（保持 URL 干净）
    try {
        localStorage.setItem('dashboard_data_v3', jsonStr);
        console.log('💾 数据已保存');
    } catch (e) {
        console.warn('⚠️ localStorage 保存失败:', e.message);
    }
}

function getShareURL() {
    // 仅在用户主动点击时生成分享链接（含 hash）
    const jsonStr = JSON.stringify(DATA);
    const base64 = btoa(encodeURIComponent(jsonStr));
    return window.location.origin + window.location.pathname + '#' + base64;
}

// ═══════════════════════════════════════════════════════════════
// 数据修复：将百分比ROI转回比值（兼容旧数据）
// ═══════════════════════════════════════════════════════════════
function normalizeROIData() {
    let fixed = 0;
    
    // 1. 修复每个月的 KPI[4].value（ROI 比值）
    DATA.months.forEach((m, i) => {
        const roiVal = m.kpi[4].value;
        if (roiVal && roiVal !== '--' && roiVal !== '') {
            const n = parseFloat(roiVal);
            // 比值通常在 0~10 之间，如果 > 10 说明是百分比，除以 100
            if (!isNaN(n) && n > 10) {
                m.kpi[4].value = (n / 100).toFixed(1);
                console.log(`  🔧 ${m.monthName} ROI: ${n}% → ${m.kpi[4].value} (比值)`);
                fixed++;
            }
        }
        // 确保 unit 为 ": 1"
        if (m.kpi[4].unit !== ': 1' && m.kpi[4].unit !== '') {
            m.kpi[4].unit = ': 1';
            fixed++;
        }
    });
    
    // 2. 修复 trend.cumulativeROI（百分比 → 比值）
    if (DATA.trend && DATA.trend.cumulativeROI) {
        DATA.trend.cumulativeROI = DATA.trend.cumulativeROI.map((v, i) => {
            if (v === null || v === undefined) return null;
            if (v > 10) {
                console.log(`  🔧 trend.cumulativeROI[${i}]: ${v}% → ${(v/100).toFixed(1)}`);
                fixed++;
                return parseFloat((v / 100).toFixed(1));
            }
            return v;
        });
    }
    
    // 3. 修复 invest/return.total 浮点精度
    DATA.months.forEach(m => {
        if (m.roiDetail) {
            ['invest', 'return'].forEach(key => {
                if (m.roiDetail[key] && typeof m.roiDetail[key].total === 'number') {
                    const rounded = parseFloat(m.roiDetail[key].total.toFixed(1));
                    if (m.roiDetail[key].total !== rounded) {
                        m.roiDetail[key].total = rounded;
                        fixed++;
                    }
                }
            });
        }
    });
    
    // 4. 从KPI数据重建 cumulativeROI（确保一致性）
    if (DATA.trend) {
        DATA.trend.cumulativeROI = DATA.months.map(m => {
            const roiVal = m.kpi[4].value;
            if (roiVal && roiVal !== '--' && roiVal !== '') {
                const n = parseFloat(roiVal);
                if (!isNaN(n)) return n;
            }
            return null;
        });
    }
    
    if (fixed > 0) {
        console.log(`✅ normalizeROIData: 修复了 ${fixed} 处数据`);
        saveDataToURL();
    }
    return fixed;
}

// ═══════════════════════════════════════════════════════════════
// 辅助函数：解析KPI数值字符串
// ═══════════════════════════════════════════════════════════════
function parseKPIValue(str) {
    if (!str || str === '--' || str === '') return 0;
    const cleaned = str.replace(/,/g, '').replace(/[^0-9.]/g, '');
    return parseFloat(cleaned) || 0;
}

function formatNumber(num) {
    if (num === 0) return '0';
    if (num >= 1000) return num.toLocaleString('en-US', { maximumFractionDigits: 1 });
    return Number.isInteger(num) ? num.toString() : num.toFixed(1).replace(/\.0$/, '');
}

// ═══════════════════════════════════════════════════════════════
// 全年数据汇总计算
// ═══════════════════════════════════════════════════════════════
function calculateYearlyData() {
    const months = DATA.months;
    const validMonths = months.filter(m => m.kpi[0].value !== "--");
    if (validMonths.length === 0) return null;
    
    // 累加各月KPI数值（用户编辑的是当月值，全年需要累加）
    let totalHours = 0;
    let totalHeadcount = 0;
    let totalCost = 0;
    
    validMonths.forEach(m => {
        totalHours += parseKPIValue(m.kpi[0].value);
        totalHeadcount += parseKPIValue(m.kpi[1].value);
        totalCost += parseKPIValue(m.kpi[3].value);
    });
    
    // 投入：年度总成本，取最后一个月
    const investTotal = parseFloat((validMonths[validMonths.length - 1].roiDetail.invest.total || 0).toFixed(1));
    // 回报：逐月累加
    let returnTotal = 0;
    validMonths.forEach(m => {
        returnTotal += parseFloat((m.roiDetail.return.total || 0).toFixed(1));
    });
    returnTotal = parseFloat(returnTotal.toFixed(1));
    
    // 当前ROI = 总回报 / 总投入
    const currentROI = investTotal > 0 ? (returnTotal / investTotal).toFixed(1) : '0';
    
    // 汇总所有流程（去重，取最新状态）
    const allFlows = [];
    const flowMap = {};
    validMonths.forEach(m => {
        m.flows.forEach(f => {
            if (f.name && f.name.trim() !== '' && f.name !== '--') {
                flowMap[f.name] = f; // 后面的覆盖前面的，取最新状态
            }
        });
    });
    Object.values(flowMap).forEach(f => allFlows.push(f));
    const totalFlows = allFlows.length;
    
    // 汇总所有故事（附带月份标记）
    const allStories = [];
    validMonths.forEach(m => {
        m.stories.forEach(s => {
            if (s.title !== "--" && s.scenario !== "--") allStories.push({ ...s, _month: m.monthName });
        });
    });
    
    return {
        totalHours: formatNumber(totalHours),
        totalHeadcount: formatNumber(totalHeadcount),
        totalFlows,
        totalCost: formatNumber(totalCost),
        currentROI,
        investTotal, returnTotal,
        monthCount: validMonths.length,
        allFlows, allStories,
        latestMonth: validMonths[validMonths.length - 1]
    };
}

function autoCalcFromFlows() {
    // 扫描DOM收集所有流程
    const flows = [];
    let i = 0;
    while (true) {
        const nameEl = document.getElementById(`e-flow-${i}-name`);
        if (!nameEl) break;
        const monthlySavedVal = document.getElementById(`e-flow-${i}-monthly`).value;
        flows.push({
            name: nameEl.value.trim(),
            monthlySaved: monthlySavedVal
        });
        i++;
    }
    
    // 统计有效流程（有名称的）
    const validFlows = flows.filter(f => f.name !== '');
    const flowCount = validFlows.length;
    
    // 计算月省工时总和（尝试解析数字）
    let totalHours = 0;
    validFlows.forEach(f => {
        // 去掉非数字字符，只保留数字和小数点
        const numStr = f.monthlySaved.replace(/[^0-9.]/g, '');
        const val = parseFloat(numStr) || 0;
        totalHours += val;
    });
    
    // 更新KPI输入框
    // KPI[2] = 自动化流程数
    document.getElementById('e-kpi-2-value').value = flowCount;
    document.getElementById('e-kpi-2-unit').value = '个';
    if (flowCount > 0) {
        document.getElementById('e-kpi-2-mom').value = `+${flowCount}个`;
        document.getElementById('e-kpi-2-pct').value = '100';
        document.getElementById('e-kpi-2-trans').value = `共${flowCount}个流程运行中`;
    }
    
    // KPI[0] = 累计节省工时（这里填入当月合计，用户可按需调整累计值）
    document.getElementById('e-kpi-0-value').value = totalHours.toLocaleString();
    document.getElementById('e-kpi-0-unit').value = '小时';
    
    console.log(`✅ 自动计算完成：流程数=${flowCount}, 月省工时=${totalHours}`);
}

function autoCalcROI() {
    // 计算投入总计
    let investTotal = 0;
    for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`e-invest-val-${i}`);
        if (el) investTotal += parseFloat(el.value) || 0;
    }
    
    // 计算回报总计
    let returnTotal = 0;
    for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`e-return-val-${i}`);
        if (el) returnTotal += parseFloat(el.value) || 0;
    }
    
    // 更新投入总计和回报总计显示
    const investTotalEl = document.getElementById('e-invest-total');
    const returnTotalEl = document.getElementById('e-return-total');
    if (investTotalEl) investTotalEl.value = investTotal.toFixed(1).replace(/\.0$/, '');
    if (returnTotalEl) returnTotalEl.value = returnTotal.toFixed(1).replace(/\.0$/, '');
    
    // 计算ROI = 回报总计 / 投入总计
    let roiValue = '';
    if (investTotal > 0) {
        roiValue = (returnTotal / investTotal).toFixed(1).replace(/\.0$/, '');
    }
    
    // 更新KPI[4]（AI投入产出比）的value
    const kpi4Value = document.getElementById('e-kpi-4-value');
    if (kpi4Value) {
        kpi4Value.value = roiValue;
        // 同步更新ROI的mom/pct/trans显示
        autoCalcKPI(4);
    }
    
    console.log(`✅ ROI自动计算：投入=${investTotal}, 回报=${returnTotal}, ROI=${roiValue}`);
}

function autoCalcKPI(idx) {
    try {
        const currIdx = editingMonthIndex;
        const curr = DATA.months[currIdx];
        
        // 获取当前输入的数值
        const valueInput = document.getElementById(`e-kpi-${idx}-value`);
        const currValStr = valueInput ? valueInput.value : '';
        
        // 解析数值
        function parseNum(str) {
            if (!str || str === '--' || str === '') return 0;
            const cleaned = str.replace(/,/g, '').replace(/[^0-9.]/g, '');
            return parseFloat(cleaned) || 0;
        }
        
        function fmtNum(n) {
            return Number.isInteger(n) ? n.toString() : n.toFixed(1).replace(/\.0$/, '');
        }
        
        const currVal = parseNum(currValStr);
        
        // KPI 配置
        const kpiConfigs = [
            { idx: 0, title: '累计节省工时', unit: '小时', transTemplate: (v) => `约 ${(v / 1740).toFixed(1)}人/月` },
            { idx: 1, title: '节省人力数', unit: '人', transTemplate: (v) => `约释放${Math.round(v)}个全职` },
            { idx: 2, title: '自动化流程数', unit: '个', transTemplate: (v) => `覆盖${Math.max(1, Math.round(v / 2))}个部门` },
            { idx: 3, title: '人力成本节省', unit: '万', transTemplate: (v) => `相当于省出${(v / 12).toFixed(1)}个年薪` }
        ];
        
        // ROI 特殊处理
        if (idx === 4) {
            const momDisplay = document.getElementById(`e-kpi-4-mom-display`);
            const pctDisplay = document.getElementById(`e-kpi-4-pct-display`);
            const transDisplay = document.getElementById(`e-kpi-4-trans-display`);
            const momHidden = document.getElementById(`e-kpi-4-mom`);
            const pctHidden = document.getElementById(`e-kpi-4-pct`);
            const transHidden = document.getElementById(`e-kpi-4-trans`);
            
            if (momDisplay) momDisplay.textContent = '累计趋势';
            if (pctDisplay) pctDisplay.textContent = 'up';
            const transText = currValStr && currValStr !== '--' ? `每投入1元，回报${currValStr}元` : '累计趋势中';
            if (transDisplay) transDisplay.textContent = transText;
            
            if (momHidden) momHidden.value = '累计趋势';
            if (pctHidden) pctHidden.value = 'up';
            if (transHidden) transHidden.value = transText;
            return;
        }
        
        const cfg = kpiConfigs[idx];
        if (!cfg) return;
        
        // 获取上月数据（上月为空则默认为0）
        let prevVal = 0;
        if (currIdx > 0) {
            const prev = DATA.months[currIdx - 1];
            if (prev && prev.kpi[idx]) {
                prevVal = parseNum(prev.kpi[idx].value);
            }
        }
        
        // 计算环比和上升%
        let momText = '--';
        let pctText = '--';
        let transText = '--';
        
        if (currVal > 0) {
            if (currIdx === 0 || prevVal === 0) {
                // 首月或上月为0：按初始值处理
                const momValue = idx === 0 ? currVal.toLocaleString() : fmtNum(currVal);
                const momUnitStr = cfg.unit === '万' ? '万' : (idx === 2 ? '个' : cfg.unit);
                momText = `+${momValue}${momUnitStr}`;
                pctText = '100';
                transText = cfg.transTemplate(currVal);
            } else {
                // 有上月数据：计算环比
                const diff = currVal - prevVal;
                const pct = prevVal > 0 ? Math.round((diff / prevVal) * 100) : 100;
                
                const momSign = diff >= 0 ? '+' : '';
                const momValue = idx === 0 ? diff.toLocaleString() : fmtNum(diff);
                const momUnitStr = cfg.unit === '万' ? '万' : (idx === 2 ? '个' : cfg.unit);
                
                momText = `${momSign}${momValue}${momUnitStr}`;
                pctText = pct.toString();
                transText = cfg.transTemplate(currVal);
            }
        }
        
        // 更新显示
        const momDisplay = document.getElementById(`e-kpi-${idx}-mom-display`);
        const pctDisplay = document.getElementById(`e-kpi-${idx}-pct-display`);
        const transDisplay = document.getElementById(`e-kpi-${idx}-trans-display`);
        const momHidden = document.getElementById(`e-kpi-${idx}-mom`);
        const pctHidden = document.getElementById(`e-kpi-${idx}-pct`);
        const transHidden = document.getElementById(`e-kpi-${idx}-trans`);
        
        if (momDisplay) momDisplay.textContent = momText;
        if (pctDisplay) pctDisplay.textContent = pctText + (pctText !== '--' ? '%' : '');
        if (transDisplay) transDisplay.textContent = transText;
        
        if (momHidden) momHidden.value = momText;
        if (pctHidden) pctHidden.value = pctText;
        if (transHidden) transHidden.value = transText;
        
    } catch (err) {
        console.error('autoCalcKPI error:', err);
    }
}

    document.getElementById('e-note-source').value = '';
    document.getElementById('e-note-cost').value = '';
    document.getElementById('e-note-period').value = '';
}

function toggleEdit() {
    isEditMode = !isEditMode;
    const panel = document.getElementById('edit-panel');
    const btn = document.getElementById('edit-btn');
    
    if (isEditMode) {
        panel.classList.remove('hidden');
        btn.innerHTML = '<i class="fas fa-times mr-1"></i>关闭编辑';
        editingMonthIndex = DATA.currentMonthIndex;
        renderEditForm();
    } else {
        panel.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-edit mr-1"></i>编辑数据';
    }
}

function switchEditMonth(index) {
    // 先保存当前月份数据，再切换
    collectFormData();
    editingMonthIndex = parseInt(index);
    renderEditForm();
}

function copyFromPrevMonth() {
    if (editingMonthIndex === 0) {
        alert('已经是第一个月，没有上月数据可复制');
        return;
    }
    // 先保存当前表单数据（虽然会被覆盖，但养成好习惯）
    collectFormData();
    const prev = DATA.months[editingMonthIndex - 1];
    DATA.months[editingMonthIndex] = JSON.parse(JSON.stringify(prev));
    DATA.months[editingMonthIndex].monthName = getMonthNameByIndex(editingMonthIndex);
    DATA.months[editingMonthIndex].period = getPeriodByIndex(editingMonthIndex);
    renderEditForm();
    alert('✅ 已复制上月数据，请修改具体数字');
}

function getMonthNameByIndex(i) {
    return (i + 1) + '月';
}

function getPeriodByIndex(i) {
    return '2026.' + String(i + 1).padStart(2, '0');
}

function addNewMonth() {
    if (DATA.months.length >= 12) {
        alert('最多12个月');
        return;
    }
    const newIndex = DATA.months.length;
    const newMonth = createDefaultMonth(getMonthNameByIndex(newIndex), getPeriodByIndex(newIndex));
    newMonth.nextUpdate = '2026年' + (newIndex + 2) + '月28日';
    DATA.months.push(newMonth);
    editingMonthIndex = newIndex;
    
    DATA.trend.monthlyCost.push(null);
    DATA.trend.cumulativeROI.push(null);
    
    renderEditForm();
    alert('✅ 已新增 ' + newMonth.monthName + '，请填写数据');
}

function collectFormData() {
    const m = DATA.months[editingMonthIndex];
    
    DATA.clientName = document.getElementById('e-client').value;
    DATA.providerName = document.getElementById('e-provider').value;
    DATA.advisorName = document.getElementById('e-advisor').value;
    DATA.advisorPhone = document.getElementById('e-phone').value;
    
    // 全局数据说明
    DATA.dataNote.source = document.getElementById('e-note-source').value;
    DATA.dataNote.costBasis = document.getElementById('e-note-cost').value;
    DATA.dataNote.period = document.getElementById('e-note-period').value;
    
    m.monthName = document.getElementById('e-monthName').value;
    m.period = document.getElementById('e-period').value;
    m.nextUpdate = document.getElementById('e-next').value;

    m.kpi.forEach((k, i) => {
        let val = document.getElementById(`e-kpi-${i}-value`).value;
        let unit = document.getElementById(`e-kpi-${i}-unit`).value;
        // 清理 value 和 unit 中的 "--"
        if (val === '--') val = '';
        if (unit === '--') unit = '';
        k.value = val;
        k.unit = unit;
        k.mom = document.getElementById(`e-kpi-${i}-mom`).value;
        k.momPct = document.getElementById(`e-kpi-${i}-pct`).value;
        k.trans = document.getElementById(`e-kpi-${i}-trans`).value;
    });

    m.roiDetail.invest.total = parseFloat(document.getElementById('e-invest-total').value) || 0;
    m.roiDetail.return.total = parseFloat(document.getElementById('e-return-total').value) || 0;
    m.roiDetail.invest.items.forEach((item, i) => {
        item.name = document.getElementById(`e-invest-name-${i}`).value;
        item.value = parseFloat(document.getElementById(`e-invest-val-${i}`).value) || 0;
    });
    m.roiDetail.return.items.forEach((item, i) => {
        item.name = document.getElementById(`e-return-name-${i}`).value;
        item.value = parseFloat(document.getElementById(`e-return-val-${i}`).value) || 0;
    });

    const trendCost = document.getElementById('e-trend-cost').value;
    const trendROI = document.getElementById('e-trend-roi').value;
    DATA.trend.monthlyCost[editingMonthIndex] = trendCost ? parseFloat(trendCost) : null;
    DATA.trend.cumulativeROI[editingMonthIndex] = trendROI ? parseFloat(trendROI) : null;

    // 流程 - 动态收集（扫描DOM，不依赖数组长度）
    const newFlows = [];
    let fi = 0;
    while (true) {
        const nameEl = document.getElementById(`e-flow-${fi}-name`);
        if (!nameEl) break;
        const deptEl = document.getElementById(`e-flow-${fi}-dept`);
        const volumeEl = document.getElementById(`e-flow-${fi}-volume`);
        const savedEl = document.getElementById(`e-flow-${fi}-saved`);
        const monthlyEl = document.getElementById(`e-flow-${fi}-monthly`);
        const statusEl = document.getElementById(`e-flow-${fi}-status`);
        
        // 防御性检查：如果任何一个输入框不存在，停止扫描
        if (!deptEl || !volumeEl || !savedEl || !monthlyEl || !statusEl) {
            console.warn(`流程 ${fi} 的某些输入框不存在，停止扫描`);
            break;
        }
        
        newFlows.push({
            name: nameEl.value,
            dept: deptEl.value,
            monthlyVolume: volumeEl.value,
            savedPerTime: savedEl.value,
            monthlySaved: monthlyEl.value,
            status: statusEl.value
        });
        fi++;
    }
    console.log(`📊 collectFormData: 收集到 ${fi} 个流程`);
    DATA.months[editingMonthIndex].flows = newFlows;

    // 故事 - 动态收集（扫描DOM，不依赖数组长度）
    const newStories = [];
    let si = 0;
    while (true) {
        const deptEl = document.getElementById(`e-story-${si}-dept`);
        if (!deptEl) break;
        const titleEl = document.getElementById(`e-story-${si}-title`);
        const scenarioEl = document.getElementById(`e-story-${si}-scenario`);
        const beforeEl = document.getElementById(`e-story-${si}-before`);
        const afterEl = document.getElementById(`e-story-${si}-after`);
        if (!titleEl || !scenarioEl || !beforeEl || !afterEl) break;
        
        const results = [];
        for (let j = 0; j < 3; j++) {
            const labelEl = document.getElementById(`e-story-${si}-r${j}-label`);
            const valueEl = document.getElementById(`e-story-${si}-r${j}-value`);
            if (!labelEl || !valueEl) break;
            results.push({ label: labelEl.value, value: valueEl.value });
        }
        newStories.push({
            dept: deptEl.value,
            title: titleEl.value,
            scenario: scenarioEl.value,
            before: beforeEl.value,
            after: afterEl.value,
            results: results
        });
        si++;
    }
    DATA.months[editingMonthIndex].stories = newStories;

    // 数据说明已改为全局设置，不再保存到每月
    // m.dataNote.source = document.getElementById('e-note-source').value;
    // m.dataNote.costBasis = document.getElementById('e-note-cost').value;
    // m.dataNote.period = document.getElementById('e-note-period').value;
}

function saveAndClose() {
    // 先自动计算流程数据并同步到KPI
    autoCalcFromFlows();
    collectFormData();
    saveDataToURL();
    DATA.currentMonthIndex = editingMonthIndex;
    DATA.isYearlyView = false;
    renderMonthTabs();
    renderAll();
    toggleEdit();
    
    const tip = document.getElementById('share-tip');
    tip.classList.remove('hidden');
    setTimeout(() => tip.classList.add('hidden'), 8000);
}

function dismissShareTip() {
    document.getElementById('share-tip').classList.add('hidden');
}

// 文件导入导出
function exportToFile() {
    collectFormData();
    const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = '北谷农业-全年数据.json';
    a.click();
    URL.revokeObjectURL(url);
}

function importFromFile() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json';
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const parsed = JSON.parse(event.target.result);
                if (parsed && parsed.months && parsed.months.length > 0) {
                    DATA = parsed;
                    saveDataToURL();
                    renderMonthTabs();
                    renderAll();
                    alert('✅ 数据导入成功！共 ' + DATA.months.length + ' 个月');
                } else {
                    alert('❌ 文件格式不正确');
                }
            } catch (err) {
                alert('❌ 解析JSON失败: ' + err.message);
            }
        };
        reader.readAsText(file);
    };
    input.click();
}

function restoreFromLocalStorage() {
    try {
        const saved = localStorage.getItem('dashboard_data_v3');
        if (!saved) {
            alert('❌ 本地没有备份数据');
            return;
        }
        const parsed = JSON.parse(saved);
        if (parsed && parsed.months && parsed.months.length > 0) {
            if (!confirm('确定从本地备份恢复数据？当前未保存的修改将丢失。')) return;
            DATA = parsed;
            saveDataToURL();
            renderMonthTabs();
            renderAll();
            alert('✅ 从本地备份恢复成功！共 ' + DATA.months.length + ' 个月');
        } else {
            alert('❌ 本地备份数据格式不正确');
        }
    } catch (e) {
        alert('❌ 恢复失败: ' + e.message);
    }
}

// 交互
function toggleROIDetail(type) {
    const investEl = document.getElementById('roi-invest-detail');
    const returnEl = document.getElementById('roi-return-detail');
    if (type === 'invest') {
        investEl.classList.toggle('hidden');
        returnEl.classList.add('hidden');
    } else {
        returnEl.classList.toggle('hidden');
        investEl.classList.add('hidden');
    }
}

// 初始化
window.addEventListener('DOMContentLoaded', () => {
    const hasURLData = loadDataFromURL();
    renderMonthTabs();
    renderAll();
    
    if (hasURLData) {
        console.log('✅ 已从 URL 加载数据');
    } else {
        console.log('ℹ️ 显示默认数据（1-6月真实数据）');
    }
});
</script>
